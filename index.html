<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アプリアイコン作成</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007aff">

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  margin: 0;
  background: #f2f2f7;
}

.header {
  padding: 16px;
  font-size: 20px;
  font-weight: bold;
}

.container {
  padding: 16px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
}

.preview {
  width: 90px;
  height: 90px;
  border-radius: 22px;
  display: block;
  margin-bottom: 10px;
  user-select: none;
  -webkit-user-select: none;
  pointer-events: none;
}

input[type="text"] {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.color-row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.color {
  width: 36px;
  height: 36px;
  border-radius: 50%;
}

.button {
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  flex: 1;
}

.button-row {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.add {
  background: #007aff;
  color: white;
  width: 100%;
}

.save {
  background: #34c759;
  color: white;
}

.delete {
  background: #ff3b30;
  color: white;
  flex: 0 0 60px;
}

.size-row {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 10px;
}

.size-btn {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  background: white;
}

.note {
  font-size: 12px;
  color: gray;
}

.section {
  padding: 16px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="header">アプリアイコン作成</div>

<div class="container">
  <div id="list"></div>
  <button class="add" onclick="addItem()">＋アイコン追加</button>
</div>

<div class="section">
<h3>使い方</h3>
<p>
① アイコンを作成<br>
② 保存ボタン or 長押しで保存<br>
③ ショートカットアプリで設定
</p>

<h3>プライバシーポリシー</h3>
<p>
当サイトでは広告配信のためにCookieを使用する場合があります。<br>
取得した情報は個人を特定するものではありません。
</p>
</div>

<script>
let items = [
  { text: "タイトル", color: "#34c759", size: 400 }
];

const colors = ["#ff3b30","#007aff","#34c759","#ffcc00","#af52de"];

function addItem() {
  items.push({ text: "タイトル", color: "#007aff", size: 400 });
  render();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  if (items.length === 0) {
    list.innerHTML = '<div class="note">＋ボタンでアイコンを追加してください</div>';
    return;
  }

  items.forEach((item, i) => {
    const img = createImage(item);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${img}" class="preview" />

      <input placeholder="文字 or 絵文字（改行OK）" value="${item.text}" onchange="updateText(${i}, this.value)" />

      <div class="color-row">
        ${colors.map(c =>
          `<div class="color" style="background:${c}" onclick="updateColor(${i}, '${c}')"></div>`
        ).join("")}
      </div>

      <div class="size-row">
        <button class="size-btn" onclick="changeSize(${i}, 20)">＋</button>
        <button class="size-btn" onclick="changeSize(${i}, -20)">－</button>
        <div class="note">サイズ: ${item.size}px</div>
      </div>

      <div class="button-row">
        <button class="button save" onclick="downloadOne(${i})">保存</button>
        <button class="button delete" onclick="deleteItem(${i})">×</button>
      </div>

      <div class="note">長押しでも保存できます</div>
    `;

    list.appendChild(div);
  });
}

function updateText(i, val) {
  items[i].text = val;
  render();
}

function updateColor(i, val) {
  items[i].color = val;
  render();
}

function changeSize(i, delta) {
  items[i].size = Math.max(100, items[i].size + delta);
  render();
}

function deleteItem(i) {
  items.splice(i, 1);
  render();
}

function createImage(item) {
  const canvas = document.createElement("canvas");
  canvas.width = 1024;
  canvas.height = 1024;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = item.color;
  ctx.fillRect(0, 0, 1024, 1024);

  ctx.fillStyle = "white";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  let fontSize = item.size;
  ctx.font = `bold ${fontSize}px sans-serif`;

  let lines = item.text.split("\n");

  function wrapText(text) {
    const maxWidth = 800;
    let result = [];
    let current = "";

    for (let char of text) {
      let test = current + char;
      if (ctx.measureText(test).width > maxWidth) {
        result.push(current);
        current = char;
      } else {
        current = test;
      }
    }
    if (current) result.push(current);
    return result;
  }

  let finalLines = [];
  lines.forEach(line => {
    finalLines.push(...wrapText(line));
  });

  while (true) {
    ctx.font = `bold ${fontSize}px sans-serif`;

    let tooWide = finalLines.some(line => ctx.measureText(line).width > 800);
    let totalHeight = finalLines.length * fontSize * 1.2;

    if (!tooWide && totalHeight < 900) break;

    fontSize -= 10;
    if (fontSize < 100) break;
  }

  ctx.font = `bold ${fontSize}px sans-serif`;

  const lineHeight = fontSize * 1.2;
  const startY = 512 - (finalLines.length - 1) * lineHeight / 2;

  finalLines.forEach((line, i) => {
    ctx.fillText(line, 512, startY + i * lineHeight);
  });

  return canvas.toDataURL();
}

function downloadOne(i) {
  const img = createImage(items[i]);
  const a = document.createElement("a");
  a.href = img;
  a.download = "icon.png";
  a.click();
}

render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>

</body>
</html>
