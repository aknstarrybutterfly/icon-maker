<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アプリアイコン作成</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007aff">

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  margin: 0;
  background: #f2f2f7;
}

.header {
  padding: 16px;
  font-size: 20px;
  font-weight: bold;
}

.container {
  padding: 16px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
}

.preview {
  width: 90px;
  height: 90px;
  border-radius: 22px;
  display: block;
  margin-bottom: 10px;
  user-select: none;
  pointer-events: none;
}

textarea, input {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.color-row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.color {
  width: 36px;
  height: 36px;
  border-radius: 50%;
}

.button {
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  flex: 1;
}

.button-row {
  display: flex;
  gap: 10px;
}

.add {
  background: #007aff;
  color: white;
  width: 100%;
}

.save {
  background: #34c759;
  color: white;
}

.delete {
  background: #ff3b30;
  color: white;
  flex: 0 0 60px;
}

.size-row {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 10px;
}

.size-btn {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  background: white;
}

.note {
  font-size: 12px;
  color: gray;
}
</style>
</head>

<body>

<div class="header">アプリアイコン作成</div>

<div class="container">
  <div id="list"></div>
  <button class="add" onclick="addItem()">＋アイコン追加</button>
</div>

<script>
let items = [
  { text: "タイトル", emoji: "💡", color: "#34c759", textSize: 200, emojiSize: 400 }
];

const colors = ["#ff3b30","#007aff","#34c759","#ffcc00","#af52de"];

function addItem() {
  items.push({ text: "タイトル", emoji: "⭐", color: "#007aff", textSize: 200, emojiSize: 400 });
  render();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  if (items.length === 0) {
    list.innerHTML = '<div class="note">＋で追加してください</div>';
    return;
  }

  items.forEach((item, i) => {
    const img = createImage(item);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${img}" class="preview"/>

      <input placeholder="絵文字" value="${item.emoji}" onchange="updateEmoji(${i}, this.value)" />

      <div class="size-row">
        <span>絵文字</span>
        <button class="size-btn" onclick="changeEmojiSize(${i}, 20)">＋</button>
        <button class="size-btn" onclick="changeEmojiSize(${i}, -20)">－</button>
      </div>

      <textarea rows="2" placeholder="テキスト（改行OK）" onchange="updateText(${i}, this.value)">${item.text}</textarea>

      <div class="size-row">
        <span>文字</span>
        <button class="size-btn" onclick="changeTextSize(${i}, 10)">＋</button>
        <button class="size-btn" onclick="changeTextSize(${i}, -10)">－</button>
      </div>

      <div class="color-row">
        ${colors.map(c =>
          `<div class="color" style="background:${c}" onclick="updateColor(${i}, '${c}')"></div>`
        ).join("")}
      </div>

      <div class="button-row">
        <button class="button save" onclick="downloadOne(${i})">保存</button>
        <button class="button delete" onclick="deleteItem(${i})">×</button>
      </div>
    `;

    list.appendChild(div);
  });
}

function updateText(i, val) {
  items[i].text = val;
  render();
}

function updateEmoji(i, val) {
  items[i].emoji = val;
  render();
}

function updateColor(i, val) {
  items[i].color = val;
  render();
}

function changeTextSize(i, delta) {
  items[i].textSize = Math.max(80, items[i].textSize + delta);
  render();
}

function changeEmojiSize(i, delta) {
  items[i].emojiSize = Math.max(100, items[i].emojiSize + delta);
  render();
}

function deleteItem(i) {
  items.splice(i, 1);
  render();
}

function createImage(item) {
  const canvas = document.createElement("canvas");
  canvas.width = 1024;
  canvas.height = 1024;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = item.color;
  ctx.fillRect(0, 0, 1024, 1024);

  ctx.textAlign = "center";

  // 絵文字
  ctx.font = `${item.emojiSize}px sans-serif`;
  ctx.textBaseline = "middle";
  ctx.fillText(item.emoji, 512, 300);

  ctx.fillStyle = "white";

  let fontSize = item.textSize;

  function wrapText(text, fontSize) {
    ctx.font = `bold ${fontSize}px sans-serif`;

    const maxWidth = 800;
    let lines = [];

    text.split("\n").forEach(line => {
      let current = "";

      for (let char of line) {
        let test = current + char;
        if (ctx.measureText(test).width > maxWidth) {
          if (current) lines.push(current);
          current = char;
        } else {
          current = test;
        }
      }
      if (current) lines.push(current);
    });

    return lines;
  }

  let finalLines;

  while (true) {
    finalLines = wrapText(item.text, fontSize);

    ctx.font = `bold ${fontSize}px sans-serif`;

    let tooWide = finalLines.some(line => ctx.measureText(line).width > 800);
    let totalHeight = finalLines.length * fontSize * 1.2;

    if (!tooWide && totalHeight < 500) break;

    fontSize -= 10;
    if (fontSize < 80) break;
  }

  ctx.font = `bold ${fontSize}px sans-serif`;

  const lineHeight = fontSize * 1.2;
  const startY = 650 - (finalLines.length - 1) * lineHeight / 2;

  finalLines.forEach((line, i) => {
    ctx.fillText(line, 512, startY + i * lineHeight);
  });

  return canvas.toDataURL();
}

function downloadOne(i) {
  const img = createImage(items[i]);
  const a = document.createElement("a");
  a.href = img;
  a.download = "icon.png";
  a.click();
}

render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>

</body>
</html>
