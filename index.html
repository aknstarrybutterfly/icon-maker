<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アプリアイコン作成</title>

<style>
body { font-family:-apple-system; margin:0; background:#f2f2f7; }
.header { padding:16px; font-size:20px; font-weight:bold; }
.container { padding:16px; }
.card { background:white; border-radius:16px; padding:16px; margin-bottom:12px; }
.preview { width:90px; height:90px; border-radius:22px; margin-bottom:10px; user-select:none; }
textarea,input { width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:1px solid #ccc; }
.color-row { display:flex; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
.color { width:36px; height:36px; border-radius:50%; }
.button-row { display:flex; gap:10px; }
.button { flex:1; padding:12px; border:none; border-radius:10px; }
.save { background:#34c759; color:white; }
.delete { background:#ff3b30; color:white; width:60px; }
.add { width:100%; background:#007aff; color:white; padding:14px; border:none; border-radius:12px; }
.size-row { display:flex; gap:10px; align-items:center; margin-bottom:10px; }
.size-btn { padding:6px 10px; }
.section { padding:16px; font-size:14px; }
.note { font-size:12px; color:gray; }
</style>
</head>

<body>

<div class="header">アプリアイコン作成</div>

<div class="container">
  <div id="list"></div>
  <button class="add" onclick="addItem()">＋追加</button>
</div>

<div class="section">
<h3>使い方</h3>
<p>
① 絵文字とテキストを入力<br>
② サイズや色を調整<br>
③ 保存ボタン or 長押しで保存<br>
④ ショートカットアプリでアイコン設定
</p>

<h3>プライバシーポリシー</h3>
<p>
当サイトでは広告配信のためにCookieを使用する場合があります。<br>
取得する情報は個人を特定するものではありません。
</p>
</div>

<script>
const emojiList = ["🍎","🍬","💐","🛣️","⭐️","👑"];

// ★ カラーをここで変更
const colors = [
  "#ff3b30", // 赤
  "#007aff", // 青
  "#ffcc00", // 黄色
  "#ff2d55", // ピンク
  "#af52de", // 紫
  "#5ac8fa", // 水色
  "#ff9500", // オレンジ
  "#34c759", // ミントグリーン
  "#c7c7cc"  // シルバー
];

function getRandomEmoji(){
  return emojiList[Math.floor(Math.random()*emojiList.length)];
}

function getRandomColor(){
  return colors[Math.floor(Math.random()*colors.length)];
}

let items = [
  { text:"タイトル", emoji:getRandomEmoji(), color:getRandomColor(), textSize:200, emojiSize:400 }
];

function addItem(){
  items.push({
    text:"タイトル",
    emoji:getRandomEmoji(),
    color:getRandomColor(),
    textSize:200,
    emojiSize:400
  });
  render();
}

function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  if(items.length===0){
    list.innerHTML='<div class="note">＋で追加してください</div>';
    return;
  }

  items.forEach((item,i)=>{
    const img = createImage(item);

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <img src="${img}" class="preview">

      <input value="${item.emoji}" onchange="updateEmoji(${i},this.value)">
      <div class="size-row">
        <button class="size-btn" onclick="changeEmojiSize(${i},20)">＋</button>
        <button class="size-btn" onclick="changeEmojiSize(${i},-20)">－</button>
      </div>

      <textarea rows="2" onchange="updateText(${i},this.value)">${item.text}</textarea>
      <div class="size-row">
        <button class="size-btn" onclick="changeTextSize(${i},10)">＋</button>
        <button class="size-btn" onclick="changeTextSize(${i},-10)">－</button>
      </div>

      <div class="color-row">
        ${colors.map(c=>`<div class="color" style="background:${c}" onclick="updateColor(${i},'${c}')"></div>`).join("")}
      </div>

      <div class="button-row">
        <button class="button save" onclick="downloadOne(${i})">保存</button>
        <button class="button delete" onclick="deleteItem(${i})">×</button>
      </div>
    `;

    list.appendChild(div);
  });
}

function updateText(i,v){ items[i].text=v; render(); }
function updateEmoji(i,v){ items[i].emoji=v; render(); }
function updateColor(i,v){ items[i].color=v; render(); }
function changeTextSize(i,d){ items[i].textSize=Math.max(80,items[i].textSize+d); render(); }
function changeEmojiSize(i,d){ items[i].emojiSize=Math.max(100,items[i].emojiSize+d); render(); }
function deleteItem(i){ items.splice(i,1); render(); }

function createImage(item){
  const canvas=document.createElement("canvas");
  canvas.width=1024;
  canvas.height=1024;
  const ctx=canvas.getContext("2d");

  ctx.fillStyle=item.color;
  ctx.fillRect(0,0,1024,1024);

  ctx.textAlign="center";

  ctx.font=`${item.emojiSize}px sans-serif`;
  const emojiY=200+item.emojiSize/2;
  ctx.fillText(item.emoji,512,emojiY);

  let startY=emojiY+item.emojiSize/2+50;
  let fontSize=item.textSize;

  function wrap(text){
    ctx.font=`bold ${fontSize}px sans-serif`;
    let lines=[];
    text.split("\n").forEach(line=>{
      let current="";
      for(let c of line){
        let test=current+c;
        if(ctx.measureText(test).width>800){
          lines.push(current);
          current=c;
        }else current=test;
      }
      if(current) lines.push(current);
    });
    return lines;
  }

  let lines;

  while(true){
    lines=wrap(item.text);
    let height=lines.length*fontSize*1.2;

    if(height < (1024-startY-50)) break;

    fontSize-=10;
    if(fontSize<80) break;
  }

  ctx.font=`bold ${fontSize}px sans-serif`;
  ctx.fillStyle="white";

  const lh=fontSize*1.2;

  lines.forEach((line,i)=>{
    ctx.fillText(line,512,startY+i*lh);
  });

  return canvas.toDataURL();
}

function downloadOne(i){
  const a=document.createElement("a");
  a.href=createImage(items[i]);
  a.download="icon.png";
  a.click();
}

render();
</script>

</body>
</html>
